<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparky — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --bg-card:   #fafafa;
      --bg-hover:  #f4f4f5;
      --sidebar:   #f7f7f8;
      --border:    #e4e4e7;
      --border-lo: #ececee;
      --text:      #111111;
      --text-sub:  #666666;
      --text-dim:  #aaaaaa;
      --accent:    #2563eb;
      --accent-hi: #1d4ed8;
      --white:     #111111;
      --danger:    #dc2626;
      --sidebar-w: 220px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 50;
    }

    .sidebar-top {
      padding: 1.25rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border-lo);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      margin-bottom: 0.25rem;
    }
    .sidebar-logo .bolt { color: var(--accent-hi); }

    .sidebar-nav {
      flex: 1;
      padding: 0.75rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-sub);
      text-decoration: none;
      padding: 0.55rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    .sidebar-item:hover { background: var(--bg-hover); color: var(--text); }
    .sidebar-item.active { background: var(--bg-hover); color: var(--text); font-weight: 600; }
    .sidebar-icon { width: 15px; height: 15px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: currentColor; }

    /* ── Main ───────────────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--white);
    }
    .topbar-actions {
      display: flex;
      gap: 0.5rem;
    }

    .content {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid transparent;
      padding: 0.4rem 0.9rem;
      text-decoration: none;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
    .btn-primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--text-sub); }
    .btn-ghost:hover { border-color: #c4c4c8; color: var(--text); background: var(--bg-hover); }
    .btn-danger { background: transparent; border-color: transparent; color: var(--danger); }
    .btn-danger:hover { background: rgba(220,38,38,0.08); }

    /* ── Section headings ───────────────────────────────────── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .section-head h2 {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    /* ── Circuit grid ───────────────────────────────────────── */
    .circuit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .circuit-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .circuit-card:hover { background: var(--bg-hover); border-color: #ccc; }

    /* New circuit card — same size as circuit cards */
    .new-card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .new-card:hover { background: var(--bg-hover); border-color: #aaa; }
    .new-card-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .new-card-icon {
      font-size: 1.6rem;
      color: var(--text-dim);
      line-height: 1;
    }
    .new-card-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-sub);
    }
    .new-card-sub {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Normal circuit card */
    .card-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }
    .card-thumb-grid {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .card-thumb-grid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    .card-thumb-emoji { position: relative; z-index: 1; font-size: 1.75rem; }

    .card-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
      flex: 1;
    }
    .card-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Card bottom row */
    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Three-dot menu */
    .card-menu-wrap {
      position: relative;
    }
    .card-menu-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1.1rem;
      padding: 0.15rem 0.3rem;
      border-radius: 4px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .card-menu-btn:hover { background: var(--bg-hover); color: var(--text-sub); }
    .card-menu-btn:focus { outline: none; }
    .card-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 4px);
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.35rem;
      min-width: 130px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      z-index: 200;
      display: none;
    }
    .card-dropdown.open { display: block; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.4rem 0.6rem;
      border-radius: 5px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      color: var(--text-sub);
      transition: background 0.1s, color 0.1s;
      font-family: 'Inter', sans-serif;
    }
    .dropdown-item:hover { background: var(--bg-hover); color: var(--text); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: rgba(220,38,38,0.08); color: var(--danger); }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .empty-state-icon { font-size: 2.5rem; opacity: 0.35; }
    .empty-state-text { font-size: 0.875rem; line-height: 1.6; }

    /* ── Sparks community cards ─────────────────────────────── */
    .spark-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .spark-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.12s, border-color 0.12s;
    }
    .spark-card:hover { background: var(--bg-hover); border-color: #ccc; }
    .spark-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      position: relative;
      overflow: hidden;
    }
    .spark-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 14px 14px;
    }
    .spark-thumb-emoji { position: relative; z-index: 1; }
    .spark-card-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
    }
    .spark-card-author {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: -0.4rem;
    }
    .spark-card-desc {
      font-size: 0.8125rem;
      color: var(--text-sub);
      line-height: 1.55;
      flex: 1;
    }
    .spark-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* ── Publish modal ──────────────────────────────────────── */
    #publish-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
    }
    .publish-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.14);
      width: 420px;
      max-width: calc(100vw - 2rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .publish-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .publish-title-row {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .publish-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.9rem;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      line-height: 1;
    }
    .publish-close:hover { background: var(--bg-hover); color: var(--text); }
    .publish-thumb {
      width: 100%;
      aspect-ratio: 16/7;
      background: #1a1c24;
      overflow: hidden;
      flex-shrink: 0;
    }
    .publish-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .publish-fields {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
    }
    .publish-label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-sub);
    }
    .publish-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.65rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .publish-input:focus { border-color: var(--accent); }
    .publish-textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.5;
    }
    .publish-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0 1.25rem 1.25rem;
    }
    .publish-actions .btn { flex: 1; justify-content: center; }

    /* ── Hidden file input ──────────────────────────────────── */
    #import-input { display: none; }

    /* ── Tabs (hidden, controlled by JS) ───────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #111111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 1.1rem;
      font-size: 0.8125rem;
      color: #f5f5f5;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <a href="landing.html" class="sidebar-logo">
        <span class="bolt">⚡</span>Sparky
      </a>
      <div id="user-info" style="font-size:0.75rem; color:var(--text-dim); padding:0.25rem 0.5rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" id="nav-my" onclick="switchTab('my')">
        <span class="sidebar-icon"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="9" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="1.5" y="9" width="4.5" height="4.5" rx="1"/><rect x="9" y="9" width="4.5" height="4.5" rx="1"/></svg></span>My Circuits
      </button>
      <button class="sidebar-item" id="nav-sparks" onclick="switchTab('sparks')">
        <span class="sidebar-icon"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2L4.5 8.5H8.5L6 13 11.5 6H7.5L9 2z"/></svg></span>Sparks
      </button>
      <div style="flex:1;"></div>
      <button class="sidebar-item" onclick="logout()">
        <span class="sidebar-icon"><svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5.5 3H3a1 1 0 00-1 1v7a1 1 0 001 1h2.5"/><path d="M9 5.5l3 2-3 2"/><line x1="12" y1="7.5" x2="6" y2="7.5"/></svg></span>Log Out
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">My Circuits</span>
      <div class="topbar-actions" id="topbar-actions">
        <button class="btn btn-ghost" onclick="triggerImport()">↑ Import .sparky</button>
        <button class="btn btn-primary" onclick="newCircuit()">+ New Circuit</button>
      </div>
    </header>

    <div class="content">
      <!-- MY CIRCUITS TAB -->
      <div class="tab-panel active" id="tab-my">
        <div class="section-head">
          <h2 id="circuits-count">Your circuits</h2>
        </div>
        <div class="circuit-grid" id="circuits-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- SPARKS TAB -->
      <div class="tab-panel" id="tab-sparks">
        <div class="section-head">
          <h2>Community Sparks</h2>
        </div>
        <div class="spark-grid" id="sparks-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden import input -->
  <input type="file" id="import-input" accept=".sparky,.json" multiple />

  <!-- Publish Modal -->
  <div id="publish-modal" style="display:none">
    <div class="publish-card">
      <div class="publish-header">
        <div class="publish-title-row">Publish to Sparks</div>
        <button class="publish-close" onclick="closePublishModal()">✕</button>
      </div>
      <div id="publish-thumb" class="publish-thumb"></div>
      <div class="publish-fields">
        <label class="publish-label">Title
          <input id="publish-name" class="publish-input" type="text" placeholder="Circuit name…">
        </label>
        <label class="publish-label">Your name
          <input id="publish-author" class="publish-input" type="text" placeholder="e.g. @yourname">
        </label>
        <label class="publish-label">Description
          <textarea id="publish-desc" class="publish-input publish-textarea" placeholder="What does this circuit do? What will others learn?"></textarea>
        </label>
      </div>
      <div class="publish-actions">
        <button class="btn btn-primary" onclick="submitPublish()">Publish</button>
        <button class="btn btn-ghost" onclick="closePublishModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── API config ───────────────────────────────────────────────
    const API_BASE = 'http://localhost:5001';

    // ── Token helpers ────────────────────────────────────────────
    function getToken() { return localStorage.getItem('sparky_token'); }
    function clearToken() { localStorage.removeItem('sparky_token'); }
    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken(),
      };
    }

    function logout() {
      clearToken();
      window.location.href = 'landing.html';
    }

    // ── Auth gate ────────────────────────────────────────────────
    let _currentUser = null;
    let _authUsername = null; // set when /api/auth/me succeeds

    async function checkAuth() {
      const token = getToken();
      if (!token) { window.location.href = 'landing.html'; return; }
      try {
        const res = await fetch(API_BASE + '/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) { clearToken(); window.location.href = 'landing.html'; return; }
        const { user } = await res.json();
        _currentUser = user;
        document.getElementById('user-info').textContent = user.email || user.name || '';
      } catch {
        clearToken();
        window.location.href = 'landing.html';
      }
    }

    // Silent auth — try to get logged-in user; never redirects on failure
    async function tryAuth() {
      const token = getToken();
      if (!token) return;
      try {
        const res = await fetch(API_BASE + '/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token },
        });
        if (!res.ok) return;
        const data = await res.json();
        const user = data.user || data;
        _currentUser = user;
        if (user.email) {
          _authUsername = user.email.split('@')[0];
          localStorage.setItem('sparky_username', _authUsername);
          document.getElementById('user-info').textContent = _authUsername;
        } else if (user.name) {
          _authUsername = user.name;
          localStorage.setItem('sparky_username', _authUsername);
          document.getElementById('user-info').textContent = _authUsername;
        }
      } catch { /* offline / no backend — ignore */ }
    }

    // ── Local project storage ─────────────────────────────────────
    const LS_KEY = 'sparky_local_projects';
    let _circuitsCache = [];

    function loadCircuits() {
      try { _circuitsCache = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
      catch { _circuitsCache = []; }
      return _circuitsCache;
    }

    function saveCircuitLocal(entry) {
      const projects = loadCircuits();
      const idx = projects.findIndex(p => p.id === entry.id);
      if (idx >= 0) projects[idx] = entry; else projects.unshift(entry);
      localStorage.setItem(LS_KEY, JSON.stringify(projects));
    }

    function deleteCircuitLocal(id) {
      const projects = loadCircuits().filter(p => p.id !== id);
      localStorage.setItem(LS_KEY, JSON.stringify(projects));
    }

    // ── Sparks (user-uploaded) ──────────────────────────────────
    const SPARKS_KEY = 'sparky_sparks';

    function loadSparks() {
      try { return JSON.parse(localStorage.getItem(SPARKS_KEY) || '[]'); } catch { return []; }
    }

    function saveSpark(entry) {
      const sparks = loadSparks();
      if (!sparks.find(s => s.id === entry.id)) sparks.unshift(entry);
      localStorage.setItem(SPARKS_KEY, JSON.stringify(sparks));
    }

    function removeSpark(id) {
      const sparks = loadSparks().filter(s => s.id !== id);
      localStorage.setItem(SPARKS_KEY, JSON.stringify(sparks));
    }

    // ── Publish modal ──────────────────────────────────────────
    let _publishIdx = null;

    function openPublishModal(idx) {
      const c = _circuitsCache[idx];
      if (!c) return;
      _publishIdx = idx;

      // Pre-fill fields
      document.getElementById('publish-name').value = c.name || '';
      document.getElementById('publish-desc').value = '';

      const authorEl = document.getElementById('publish-author');
      const knownUser = _authUsername || localStorage.getItem('sparky_username') || '';
      authorEl.value    = knownUser;
      authorEl.readOnly = !!_authUsername;
      authorEl.style.background = _authUsername ? 'var(--bg-hover)' : '';
      authorEl.style.color      = _authUsername ? 'var(--text-sub)' : '';
      authorEl.style.cursor     = _authUsername ? 'default' : '';

      // Thumbnail preview
      const th = document.getElementById('publish-thumb');
      th.innerHTML = c.thumbnail
        ? `<img src="${c.thumbnail}">`
        : '';

      document.getElementById('publish-modal').style.display = 'flex';
      document.getElementById('publish-name').focus();
    }

    function closePublishModal() {
      document.getElementById('publish-modal').style.display = 'none';
      _publishIdx = null;
    }

    function submitPublish() {
      const c = _circuitsCache[_publishIdx];
      if (!c) return;

      const name   = document.getElementById('publish-name').value.trim()   || c.name || 'Untitled';
      const author = document.getElementById('publish-author').value.trim() || 'Anonymous';
      const desc   = document.getElementById('publish-desc').value.trim();

      // Persist username for next time (only if not locked to auth account)
      if (!_authUsername) localStorage.setItem('sparky_username', author);

      saveSpark({
        id:         c.id,
        name,
        author,
        desc,
        thumbnail:  c.thumbnail || null,
        sharedAt:   new Date().toISOString(),
        components: c.components || [],
        wires:      c.wires      || [],
      });

      closePublishModal();
      showToast(`"${name}" published to Sparks!`);
      if (document.getElementById('tab-sparks').classList.contains('active')) renderSparks();
    }

    // Close modal on backdrop click
    document.getElementById('publish-modal').addEventListener('click', function(e) {
      if (e.target === this) closePublishModal();

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('nav-' + tab).classList.add('active');

      const title = tab === 'my' ? 'My Circuits' : 'Sparks';
      document.getElementById('topbar-title').textContent = title;
      document.getElementById('topbar-actions').style.display = tab === 'my' ? 'flex' : 'none';

      if (tab === 'sparks') renderSparks(); // always re-render (user sparks change)
    }

    // ── Render MY CIRCUITS ─────────────────────────────────────
    function renderMyCircuits() {
      const circuits = loadCircuits();
      const grid  = document.getElementById('circuits-grid');
      const count = document.getElementById('circuits-count');
      let emptyEl = document.getElementById('circuits-empty');

      count.textContent = circuits.length === 0
        ? 'Your circuits'
        : `Your circuits (${circuits.length})`;

      grid.innerHTML = '';

      // New circuit card — full card size
      const newCard = document.createElement('button');
      newCard.className = 'new-card';
      newCard.onclick = newCircuit;
      newCard.innerHTML = `
        <div class="new-card-thumb"><span class="new-card-icon">＋</span></div>
        <div class="new-card-label">New Circuit</div>
        <div class="new-card-sub">Start from scratch</div>
      `;
      grid.appendChild(newCard);

      if (circuits.length === 0) {
        if (!emptyEl) {
          emptyEl = document.createElement('div');
          emptyEl.id = 'circuits-empty';
          emptyEl.className = 'empty-state';
          emptyEl.innerHTML = `
            <div class="empty-state-icon">📂</div>
            <div class="empty-state-text">No saved circuits yet.<br>Create one or import a <code>.sparky</code> file.</div>
          `;
          grid.parentNode.insertBefore(emptyEl, grid.nextSibling);
        }
        emptyEl.style.display = 'flex';
        return;
      }

      if (emptyEl) emptyEl.style.display = 'none';

      circuits.forEach((c, idx) => {
        grid.appendChild(makeCircuitCard(c, idx));
      });
    }

    function makeCircuitCard(c, idx) {
      const card = document.createElement('div');
      card.className = 'circuit-card';

      const compCount = (c.components ?? c.circuit?.components)?.length ?? 0;
      const wireCount = (c.wires     ?? c.circuit?.wires    )?.length ?? 0;
      const saved = c.updatedAt ? new Date(c.updatedAt).toLocaleDateString() : '';

      const thumbHtml = c.thumbnail
        ? `<img src="${c.thumbnail}" style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div class="card-thumb-grid"><span class="card-thumb-emoji" style="color:var(--text-dim)"><svg width="36" height="25" viewBox="0 0 36 25" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="1" y="4" width="34" height="17" rx="1.5"/><line x1="7" y1="4" x2="7" y2="21"/><line x1="13" y1="4" x2="13" y2="21"/><line x1="18" y1="4" x2="18" y2="21"/><line x1="23" y1="4" x2="23" y2="21"/><line x1="29" y1="4" x2="29" y2="21"/><line x1="4" y1="1.5" x2="4" y2="4"/><line x1="10" y1="1.5" x2="10" y2="4"/><line x1="15" y1="1.5" x2="15" y2="4"/><line x1="20" y1="1.5" x2="20" y2="4"/><line x1="26" y1="1.5" x2="26" y2="4"/><line x1="31" y1="1.5" x2="31" y2="4"/><line x1="4" y1="21" x2="4" y2="23.5"/><line x1="10" y1="21" x2="10" y2="23.5"/><line x1="15" y1="21" x2="15" y2="23.5"/><line x1="20" y1="21" x2="20" y2="23.5"/><line x1="26" y1="21" x2="26" y2="23.5"/><line x1="31" y1="21" x2="31" y2="23.5"/></svg></span></div>`;

      card.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div>
          <div class="card-name">${escHtml(c.name || 'Untitled')}</div>
          <div class="card-meta">${compCount} component${compCount !== 1 ? 's' : ''} · ${wireCount} wire${wireCount !== 1 ? 's' : ''}</div>
        </div>
        <div class="card-row">
          <span class="card-meta">${saved}</span>
          <div class="card-menu-wrap">
            <button class="card-menu-btn" title="Options" onclick="toggleMenu(event, 'menu-${idx}')">···</button>
            <div class="card-dropdown" id="menu-${idx}">
              <button class="dropdown-item" onclick="openCircuit(${idx})">Open</button>
              <button class="dropdown-item" onclick="openPublishModal(${idx})">Publish</button>
              <button class="dropdown-item" onclick="downloadCircuit(${idx})">Download</button>
              <button class="dropdown-item danger" onclick="deleteCircuit(${idx})">Delete</button>
            </div>
          </div>
        </div>
      `;

      card.addEventListener('click', e => {
        if (e.target.closest('.card-menu-wrap')) return;
        openCircuit(idx);
      });

      return card;
    }

    function openCircuit(idx) {
      const c = _circuitsCache[idx];
      if (!c) return;
      // Pass the full entry so designer can restore name + id
      const payload = { id: c.id, name: c.name, components: c.components ?? c.circuit?.components ?? [], wires: c.wires ?? c.circuit?.wires ?? [] };
      sessionStorage.setItem('sparky_load_circuit', JSON.stringify(payload));
      window.location.href = 'circuit3d/index.html';
    }

    function downloadCircuit(idx) {
      const c = _circuitsCache[idx];
      if (!c) return;
      const payload = { id: c.id, name: c.name, components: c.components ?? c.circuit?.components ?? [], wires: c.wires ?? c.circuit?.wires ?? [] };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(c.name || 'circuit').replace(/\s+/g, '_')}.sparky`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`Downloaded "${c.name}"`);
    }

    function deleteCircuit(idx) {
      const c = _circuitsCache[idx];
      if (!c) return;
      const name = c.name || 'circuit';
      if (!confirm(`Delete "${name}"?`)) return;
      deleteCircuitLocal(c.id);
      renderMyCircuits();
      showToast(`Deleted "${name}"`);
    }

    function newCircuit() {
      sessionStorage.removeItem('sparky_load_circuit');
      window.location.href = 'circuit3d/index.html';
    }

    // ── Toggle card dropdown ───────────────────────────────────
    function toggleMenu(e, id) {
      e.stopPropagation();
      const menu = document.getElementById(id);
      const isOpen = menu.classList.contains('open');
      // Close all
      document.querySelectorAll('.card-dropdown').forEach(m => m.classList.remove('open'));
      if (!isOpen) menu.classList.add('open');
    }

    // Close menus on outside click
    document.addEventListener('click', () => {
      document.querySelectorAll('.card-dropdown').forEach(m => m.classList.remove('open'));
    });

    // ── Import .sparky ─────────────────────────────────────────
    function triggerImport() {
      document.getElementById('import-input').click();
    }

    document.getElementById('import-input').addEventListener('change', async function () {
      const files = Array.from(this.files);
      if (!files.length) return;
      let imported = 0;

      for (const file of files) {
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const name = data.name || file.name.replace(/\.(sparky|json)$/i, '').replace(/_/g, ' ');
          saveCircuitLocal({
            id:        data.id || (Date.now().toString(36) + Math.random().toString(36).slice(2)),
            name,
            thumbnail: data.thumbnail || null,
            updatedAt: new Date().toISOString(),
            components: data.components || [],
            wires:      data.wires      || [],
          });
          imported++;
        } catch {}
      }

      this.value = '';
      renderMyCircuits();
      showToast(imported === 1 ? 'Circuit imported!' : `${imported} circuits imported!`);
    });

    // ── Render SPARKS ──────────────────────────────────────────
    function renderSparks() {
      const grid   = document.getElementById('sparks-grid');
      const sparks = loadSparks();
      grid.innerHTML = '';

      if (!sparks.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state-icon">✦</div>
            <div class="empty-state-text">No sparks yet.<br>Share one of your circuits using the ··· menu.</div>
          </div>`;
        return;
      }

      sparks.forEach((spark, idx) => {
        const thumbHtml = spark.thumbnail
          ? `<img src="${spark.thumbnail}" style="width:100%;height:100%;object-fit:cover;display:block;">`
          : `<span style="color:#555"><svg width="40" height="28" viewBox="0 0 36 25" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="1" y="4" width="34" height="17" rx="1.5"/><line x1="7" y1="4" x2="7" y2="21"/><line x1="13" y1="4" x2="13" y2="21"/><line x1="18" y1="4" x2="18" y2="21"/><line x1="23" y1="4" x2="23" y2="21"/><line x1="29" y1="4" x2="29" y2="21"/><line x1="4" y1="1.5" x2="4" y2="4"/><line x1="10" y1="1.5" x2="10" y2="4"/><line x1="15" y1="1.5" x2="15" y2="4"/><line x1="20" y1="1.5" x2="20" y2="4"/><line x1="26" y1="1.5" x2="26" y2="4"/><line x1="31" y1="1.5" x2="31" y2="4"/><line x1="4" y1="21" x2="4" y2="23.5"/><line x1="10" y1="21" x2="10" y2="23.5"/><line x1="15" y1="21" x2="15" y2="23.5"/><line x1="20" y1="21" x2="20" y2="23.5"/><line x1="26" y1="21" x2="26" y2="23.5"/><line x1="31" y1="21" x2="31" y2="23.5"/></svg></span>`;

        const card = document.createElement('div');
        card.className = 'spark-card';
        card.innerHTML = `
          <div class="spark-thumb" style="background:#1a1c24">${thumbHtml}</div>
          <div class="spark-card-title">${escHtml(spark.name || 'Untitled')}</div>
          <div class="spark-card-author">${spark.author ? escHtml(spark.author) : ''}${spark.sharedAt ? ' · ' + new Date(spark.sharedAt).toLocaleDateString() : ''}</div>
          ${spark.desc ? `<div class="spark-card-desc">${escHtml(spark.desc)}</div>` : ''}
          <div class="spark-card-footer">
            <button class="btn btn-ghost" style="font-size:0.75rem;" onclick="forkSpark('${spark.id}')">Fork to My Circuits</button>
            <button class="btn btn-danger" style="font-size:0.75rem;" onclick="unshareFromSparks('${spark.id}')">Remove</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function forkSpark(id) {
      const spark = loadSparks().find(s => s.id === id);
      if (!spark) return;
      saveCircuitLocal({
        id:        Date.now().toString(36) + Math.random().toString(36).slice(2),
        name:      spark.name,
        thumbnail: spark.thumbnail || null,
        updatedAt: new Date().toISOString(),
        components: spark.components || [],
        wires:      spark.wires      || [],
      });
      switchTab('my');
      renderMyCircuits();
      showToast(`Forked "${spark.name}" to your circuits!`);
    }

    function unshareFromSparks(id) {
      removeSpark(id);
      renderSparks();
      showToast('Removed from Sparks.');
    }

    // ── Toast ──────────────────────────────────────────────────
    let _toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }

    // ── Escape HTML ────────────────────────────────────────────
    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Init ───────────────────────────────────────────────────
    tryAuth(); // silently populate username if logged in (non-blocking)
    renderMyCircuits();
  </script>
