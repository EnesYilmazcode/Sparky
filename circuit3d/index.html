<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <div class="topbar-left-group">
      <a class="topbar-brand" href="../dashboard.html" title="Back to dashboard" style="text-decoration:none;color:inherit;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Sparky
      </a>
      <span class="topbar-name-sep">·</span>
      <span id="circuit-name-field"
            contenteditable="true"
            spellcheck="false"
            title="Click to rename circuit"
            onblur="App.state.circuitName = this.textContent.trim() || 'Untitled'; this.textContent = App.state.circuitName; if(App.scheduleAutoSave) App.scheduleAutoSave();"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">Untitled</span>
    </div>

    <div class="topbar-center">
      <button class="btn-simulate" id="sim-run-btn" onclick="App.runSimulation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        Run Simulation
      </button>
      <button class="btn-stop" id="sim-stop-btn" onclick="App.stopSimulation()" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16"/>
        </svg>
        Stop
      </button>
    </div>

    <div class="topbar-actions">
      <button class="btn-secondary" onclick="App.saveCircuit()" title="Download circuit as .sparky file">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
    </div>
  </header>

  <!-- BODY -->
  <div id="body">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-section-label">Components</div>

      <button class="comp-item" data-type="resistor">

            <line x1="1" y1="14" x2="7" y2="14"/>
            <rect x="7" y="10" width="14" height="8" rx="1.5" fill="currentColor" fill-opacity="0.1"/>
            <rect x="7" y="10" width="14" height="8" rx="1.5"/>
            <line x1="11.5" y1="10" x2="11.5" y2="18"/>
            <line x1="14" y1="10" x2="14" y2="18"/>
            <line x1="16.5" y1="10" x2="16.5" y2="18"/>
            <line x1="21" y1="14" x2="27" y2="14"/>
          </svg>
        </span>
        <div class="comp-item-text">
          <span class="comp-item-name">Resistor</span>
          <span class="comp-item-sub">2 leads · axial</span>
        </div>
      </button>

      <button class="comp-item" data-type="led">
        <span class="comp-item-icon">

          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 19 C8 7, 20 7, 20 19 Z" fill="currentColor" fill-opacity="0.15"/>
            <path d="M8 19 C8 7, 20 7, 20 19"/>
            <line x1="6" y1="19" x2="22" y2="19"/>
            <line x1="10" y1="19" x2="10" y2="26"/>
            <line x1="18" y1="19" x2="18" y2="26"/>
            <line x1="22" y1="11" x2="25" y2="8" stroke-width="1.3"/>
            <line x1="22" y1="15" x2="26" y2="15" stroke-width="1.3"/>
          </svg>
        </span>
        <div class="comp-item-text">
          <span class="comp-item-name">LED</span>
          <span class="comp-item-sub">2 leads · 5mm</span>
        </div>
      </button>

      <button class="comp-item" data-type="battery">
        <span class="comp-item-icon">

            <rect x="10" y="3" width="8" height="4" rx="1"/>
            <rect x="5" y="7" width="18" height="17" rx="2" fill="currentColor" fill-opacity="0.1"/>
            <rect x="5" y="7" width="18" height="17" rx="2"/>
            <line x1="9" y1="14" x2="12" y2="14" stroke-width="1.5"/>

        </span>

          <span class="comp-item-name">Push Button</span>

      </button>

          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
        Reset View

    <div id="sparky-panel">

      <div id="sparky-messages">

        <!-- Welcome / empty state -->
        <div id="sparky-welcome">
          <div class="sparky-welcome-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div class="sparky-welcome-title">Sparky</div>
          <div class="sparky-welcome-sub">What would you like to build?</div>
          <div id="sparky-suggestions">
            <button class="sparky-suggest-btn" onclick="sparkyQuick('Build a complete working LED circuit from scratch. Place all the components and wires needed.', true)">⚡ Build an LED circuit</button>
            <button class="sparky-suggest-btn" onclick="sparkyQuick('Analyze my circuit and tell me if it will work correctly.', false)">🔍 Analyze my circuit</button>
            <button class="sparky-suggest-btn" onclick="sparkyQuick('What components or wires should I add to improve my circuit?', false)">🔧 What should I add?</button>
          </div>
        </div>

      <div id="sparky-pending-bar" style="display:none">
        <button class="pending-accept" onclick="sparkyAcceptChanges()">Accept</button>
        <button class="pending-decline" onclick="sparkyDeclineChanges()">Decline</button>
      </div>

      <div id="sparky-input-row">
        <textarea id="sparky-input" rows="1" placeholder="Ask Sparky anything…"></textarea>
      </div>

    </div>

  </div>

  <!-- Load Preview Modal -->
  <div id="load-preview-modal" style="display:none">
    <div class="lpm-card">

      <div class="lpm-btns">

      </div>
    </div>
  </div>

</div>

const GEMINI_KEY   = 'AIzaSyAqM15eq8Dx-wdF0NR4q7PdAX975NVdJy4';
const GEMINI_MODEL = 'gemini-2.0-flash';
const GEMINI_URL   = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
const chatHistory = [];   // {role:'user'|'model', text} pairs for conversation memory

const SYSTEM_PROMPT = [

  '- Placing a component on the board does NOT connect it to power or ground.',
  '- You MUST add_wire from a power rail (tp_N) to each component that needs +9V.',

const CIRCUIT_TOOLS = [{
  function_declarations: [
    { name: 'delete_all', description: 'Clear all components and wires from the board.' },
    { name: 'place_battery', description: 'Place a 9V battery off-board. Follow with add_wire calls to connect battery_0_pin0 to tp_N and battery_0_pin1 to tn_N.' },
    { name: 'place_resistor', description: 'Place a resistor. holeA and holeB must be exactly 4 columns apart on the same row.',
      parameters: { type: 'OBJECT', properties: { holeA: { type: 'STRING' }, holeB: { type: 'STRING' } }, required: ['holeA', 'holeB'] } },
    { name: 'place_led', description: 'Place an LED. holeA = cathode (-), holeB = anode (+). 2 columns apart.',
      parameters: { type: 'OBJECT', properties: { holeA: { type: 'STRING' }, holeB: { type: 'STRING' } }, required: ['holeA', 'holeB'] } },
    { name: 'place_buzzer', description: 'Place a buzzer. 2 columns apart.',
      parameters: { type: 'OBJECT', properties: { holeA: { type: 'STRING' }, holeB: { type: 'STRING' } }, required: ['holeA', 'holeB'] } },
    { name: 'place_button', description: 'Place a push button. 3 columns apart.',
      parameters: { type: 'OBJECT', properties: { holeA: { type: 'STRING' }, holeB: { type: 'STRING' } }, required: ['holeA', 'holeB'] } },
    { name: 'add_wire', description: 'Add a wire between two points.',
      parameters: { type: 'OBJECT', properties: { from: { type: 'STRING' }, to: { type: 'STRING' }, color: { type: 'STRING' } }, required: ['from', 'to', 'color'] } },
  ],
}];

function validateActions(actions) {
  if (!Array.isArray(actions) || actions.length === 0) return actions;
  const result = [...actions];
  let batIdx = 0, offset = 0;
  for (let i = 0; i < actions.length; i++) {
    if (actions[i].tool !== 'place_battery') continue;
    const pin0 = `battery_${batIdx}_pin0`, pin1 = `battery_${batIdx}_pin1`;
    const hasPos = result.some(a => a.tool === 'add_wire' && (a.from === pin0 || a.to === pin0));
    const hasNeg = result.some(a => a.tool === 'add_wire' && (a.from === pin1 || a.to === pin1));
    if (!hasPos || !hasNeg) {
      let tpCol = null, tnCol = null;
      for (const a of result) {
        if (a.tool !== 'add_wire') continue;
        const tp = (a.from || '').match(/^tp_(\d+)$/) || (a.to || '').match(/^tp_(\d+)$/);
        const tn = (a.from || '').match(/^tn_(\d+)$/) || (a.to || '').match(/^tn_(\d+)$/);
        if (tp && !tpCol) tpCol = parseInt(tp[1]);
        if (tn && !tnCol) tnCol = parseInt(tn[1]);
      }
      if (!tpCol) { const r = actions.find(a => a.tool === 'place_resistor'); tpCol = r ? parseInt((r.holeA || '').match(/\d+/)?.[0]) || 3 : 3; }
      if (!tnCol) { const l = actions.find(a => a.tool === 'place_led'); tnCol = l ? parseInt((l.holeA || '').match(/\d+/)?.[0]) || 9 : 9; }
      const inject = [];
      if (!hasPos) inject.push({ tool: 'add_wire', from: pin0, to: `tp_${tpCol}`, color: 'red' });
      if (!hasNeg) inject.push({ tool: 'add_wire', from: pin1, to: `tn_${tnCol}`, color: 'black' });
      result.splice(i + 1 + offset, 0, ...inject);
      offset += inject.length;
    }
    batIdx++;
  }
  const wiredHoles = new Set();
  for (const a of result) { if (a.tool === 'add_wire') { if (a.from) wiredHoles.add(a.from); if (a.to) wiredHoles.add(a.to); } }
  const resistors = result.filter(a => a.tool === 'place_resistor');
  const leds = result.filter(a => a.tool === 'place_led');
  for (const res of resistors) {
    const led = leds.find(l => l.holeA === res.holeA || l.holeA === res.holeB || l.holeB === res.holeA || l.holeB === res.holeB);
    if (!led) continue;
    const resSharedB = (res.holeB === led.holeA || res.holeB === led.holeB);
    const resOuter = resSharedB ? res.holeA : res.holeB;
    const ledSharedB = (led.holeB === res.holeA || led.holeB === res.holeB);
    const ledOuter = ledSharedB ? led.holeA : led.holeB;
    const resCol = resOuter.match(/(\d+)/)?.[1];
    if (resCol && !wiredHoles.has(resOuter)) { result.push({ tool: 'add_wire', from: `tp_${resCol}`, to: resOuter, color: 'red' }); wiredHoles.add(resOuter); }
    const ledCol = ledOuter.match(/(\d+)/)?.[1];
    if (ledCol && !wiredHoles.has(ledOuter)) { result.push({ tool: 'add_wire', from: ledOuter, to: `tn_${ledCol}`, color: 'black' }); wiredHoles.add(ledOuter); }
  }
  return result;
}

async function askGeminiClient(markdown, userMsg, history) {
  const msg = userMsg || 'Analyze my circuit and tell me what to do next.';
  const boardState = markdown || '**Board is EMPTY — no components or wires placed.**';
  const contents = [];
  if (Array.isArray(history) && history.length) {
    for (const h of history) {
      const role = h.role === 'model' ? 'model' : 'user';
      if (h.text) contents.push({ role, parts: [{ text: h.text }] });
    }
  }
  contents.push({ role: 'user', parts: [{ text: `BOARD STATE:\n${boardState}\n\nQUESTION: ${msg}` }] });
  const body = {
    system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents,
    tools: CIRCUIT_TOOLS,
    tool_config: { function_calling_config: { mode: 'AUTO' } },
    generation_config: { temperature: 0.3, max_output_tokens: 2048 },
  };
  const res = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const err = await res.text(); throw new Error(`Gemini ${res.status}: ${err}`); }
  const data = await res.json();
  const candidate = data.candidates?.[0];
  if (!candidate || candidate.finishReason === 'SAFETY') return { reply: "I can't help with that request. Try asking about building a circuit!", actions: [] };
  const parts = candidate.content?.parts || [];
  let reply = '', actions = [];
  for (const part of parts) {
    if (part.text) reply += part.text;
    if (part.functionCall) { const fc = part.functionCall; actions.push({ tool: fc.name, ...(fc.args || {}) }); }
  }
  reply = reply.trim();
  if (!reply && actions.length > 0) reply = "Here you go! I've built the circuit for you. Hit Run Simulation to test it out!";
  else if (!reply) reply = '(no response)';
  if (actions.length === 0) {
    const match = reply.match(/```(?:actions|json)\s*([\s\S]*?)```/);
    if (match) { try { const parsed = JSON.parse(match[1].trim()); if (Array.isArray(parsed)) actions = parsed; reply = reply.slice(0, match.index).trim(); } catch {} }
  }
  actions = actions.filter(a => {
    if (a.tool === 'add_wire' && (!a.from || !a.to)) return false;
    if (['place_resistor','place_led','place_buzzer','place_button'].includes(a.tool) && (!a.holeA || !a.holeB)) return false;
    return true;
  });
  actions = validateActions(actions);
  return { reply, actions };
}

// ── Chat helpers ─────────────────────────────────────────────────

function sparkyAddMsg(text, role) {
  const welcome = document.getElementById('sparky-welcome');
  if (welcome) welcome.classList.add('hidden');
  const box = document.getElementById('sparky-messages');
  const el  = document.createElement('div');
  el.className   = 'chat-msg ' + role;
  el.textContent = text;
  box.appendChild(el);
  box.scrollTop  = box.scrollHeight;
  return el;
}

function sparkyTyping() {
  const welcome = document.getElementById('sparky-welcome');
  if (welcome) welcome.classList.add('hidden');
  const box = document.getElementById('sparky-messages');
  const el  = document.createElement('div');
  el.className = 'chat-msg typing';
  el.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  return el;
}

// ── Hole parser ──────────────────────────────────────────────────

function parseHole(str) {
  if (!str) return [null, null];
  const railM = str.match(/^(tp|tn|bp|bn)_(\d+)$/i);
  if (railM) return [parseInt(railM[2]) - 1, railM[1].toLowerCase()];
  const m = str.match(/^([a-j])(\d+)$/i);
  if (m)    return [parseInt(m[2]) - 1, m[1].toLowerCase()];
  return [null, null];
}

// ── Execute actions (real placement) ────────────────────────────

function sparkyExecActions(actions) {
  if (!actions || !actions.length) return 0;
  const bb = App.state.breadboard;
  let done = 0;
  actions.forEach(a => {
    try {
      if (a.tool === 'place_resistor') {
        const hA = bb.getHole(...parseHole(a.holeA));
        const hB = bb.getHole(...parseHole(a.holeB));
        if (hA && hB) { App.placeResistor(hA, hB); done++; }
      } else if (a.tool === 'place_led') {
        const hA = bb.getHole(...parseHole(a.holeA));
        const hB = bb.getHole(...parseHole(a.holeB));
        if (hA && hB) { App.placeLED(hA, hB); done++; }
      } else if (a.tool === 'place_buzzer') {
        const hA = bb.getHole(...parseHole(a.holeA));
        const hB = bb.getHole(...parseHole(a.holeB));
        if (hA && hB) { App.placeBuzzer(hA, hB); done++; }
      } else if (a.tool === 'place_button') {
        const hA = bb.getHole(...parseHole(a.holeA));
        const hB = bb.getHole(...parseHole(a.holeB));
        if (hA && hB) { App.placeButton(hA, hB); done++; }
      } else if (a.tool === 'place_battery') {
        App.placeBattery(13, 0); done++;
      } else if (a.tool === 'add_wire') {
        execWire(a.from, a.to, a.color); done++;
      } else if (a.tool === 'remove_component') {
        if (execRemoveComponent(a.id)) done++;
      } else if (a.tool === 'remove_wire') {
        if (execRemoveWire(a.from, a.to)) done++;
      } else if (a.tool === 'delete_all') {
        App.clearAll(); done++;
      }
    } catch (e) { console.warn('Action failed:', a, e.message); }
  });
  return done;
}

function execRemoveComponent(compId) {
  if (!compId) return false;
  // Parse id like "resistor_0", "led_1", "battery_0"
  const m = compId.match(/^(\w+)_(\d+)$/);
  if (!m) return false;
  const type = m[1], idx = parseInt(m[2]);
  const comps = App.state.components.filter(c => c.type === type);
  const comp = comps[idx];
  if (!comp) { console.warn('remove_component: not found:', compId); return false; }
  // Remove from scene
  (comp.pinMeshes || []).forEach(pm => App.scene.remove(pm));
  App.scene.remove(comp.group);
  App.state.components = App.state.components.filter(c => c !== comp);
  console.log('Removed component:', compId);
  return true;
}

function execRemoveWire(fromStr, toStr) {
  if (!fromStr || !toStr) return false;
  const bb = App.state.breadboard;
  // Helper to normalize a wire endpoint to a comparable string
  function holeKey(ref) {
    if (!ref) return null;
    return ref.row + (ref.col + 1);
  }
  function pinKey(comp, pinIdx) {
    if (!comp) return null;
    const idx = App.state.components.indexOf(comp);
    return `${comp.type}_${idx}_pin${pinIdx}`;
  }
  function wireEndKey(w, side) {
    if (side === 'start') {
      if (w.startHole) return holeKey(w.startHole);
      if (w.startComp) return pinKey(w.startComp, w.startPinIdx);
    } else {
      if (w.endHole) return holeKey(w.endHole);
      if (w.endComp) return pinKey(w.endComp, w.endPinIdx);
    }
    return null;
  }
  // Normalize the from/to strings for comparison
  const normFrom = fromStr.toLowerCase();
  const normTo = toStr.toLowerCase();
  // Find matching wire (check both orderings)
  const idx = App.state.wires.findIndex(w => {
    const ws = wireEndKey(w, 'start');
    const we = wireEndKey(w, 'end');
    if (!ws || !we) return false;
    return (ws === normFrom && we === normTo) || (ws === normTo && we === normFrom);
  });
  if (idx === -1) { console.warn('remove_wire: not found:', fromStr, '→', toStr); return false; }
  const wire = App.state.wires[idx];
  App.scene.remove(wire.group);
  App.state.wires.splice(idx, 1);
  console.log('Removed wire:', fromStr, '→', toStr);
  return true;
}

function execWire(fromStr, toStr, colorName) {
  const bb = App.state.breadboard;
  const COLOR_MAP = { red: 0xef4444, yellow: 0xfbbf24, green: 0x22c55e,
                      blue: 0x3b82f6, black: 0x111111, white: 0xffffff };
  const colorHex = colorName ? (COLOR_MAP[colorName.toLowerCase()] || 0xef4444) : App.state.wireColor;

  function resolve(str) {
    const pinM = str.match(/^(\w+)_(\d+)_pin(\d+)$/i);
    if (pinM) {
      const comps = App.state.components.filter(c => c.type === pinM[1]);
      const comp  = comps[parseInt(pinM[2])];
      if (comp) {
        const pm = comp.pinMeshes[parseInt(pinM[3])];
        if (pm) return { world: pm.userData.world.clone(), holeRef: null, pinMesh: pm };
      }
      return null;
    }
    const [col, row] = parseHole(str);
    if (col === null) return null;
    const h = bb.getHole(col, row);
    if (!h) return null;
    return { world: h.world.clone(), holeRef: { col: h.col, row: h.row }, pinMesh: null };
  }

  const start = resolve(fromStr);
  const end   = resolve(toStr);
  if (!start || !end) return;
  const saved = App.state.wireColor;
  App.state.wireColor = colorHex;
  App.state.wireStart = start;
  App.finishWire(end);
  App.state.wireColor = saved;
}

// ── Preview / Accept / Decline ───────────────────────────────────

let _pendingActions = null;
let _pendingGhosts  = [];

const _COLOR_MAP = { red: 0xef4444, yellow: 0xfbbf24, green: 0x22c55e,
                     blue: 0x3b82f6, black: 0x111111, white: 0xffffff };

function sparkyPreviewActions(actions) {
  sparkyDeclineChanges();          // clear any stale preview first
  if (!actions || !actions.length) return;
  _pendingActions = actions;

  const bb = App.state.breadboard;

  // ── Pre-compute expected pin positions for pending components ──
  // This lets wire ghosts resolve pins of components that don't exist yet.
  const pendingPins = {};
  const H = 2.6;                          // battery body height (must match buildBattery)
  let pendingBatteryIdx = App.state.components.filter(c => c.type === 'battery').length;
  for (const a of actions) {
    if (a.tool === 'place_battery') {
      const wx = 13, wz = 0;             // same as sparkyExecActions hardcoded position
      pendingPins[`battery_${pendingBatteryIdx}_pin0`] = new THREE.Vector3(wx - 0.32, H + 0.54, wz);
      pendingPins[`battery_${pendingBatteryIdx}_pin1`] = new THREE.Vector3(wx + 0.32, H + 0.24, wz);
      pendingBatteryIdx++;
    }
  }

  // ── Build a ghost for each action ─────────────────────────────
  for (const a of actions) {
    let ghost = null;

    // Component ghosts — use existing buildPreview (already semi-transparent)
    if (['place_resistor','place_led','place_buzzer','place_button'].includes(a.tool)) {
      const type = a.tool.replace('place_', '');
      const hA   = bb.getHole(...parseHole(a.holeA));
      const hB   = bb.getHole(...parseHole(a.holeB));
      if (hA && hB) {
        const SPANS = { resistor: App.RESISTOR_SPAN, led: App.LED_SPAN,
                        buzzer: App.BUZZER_SPAN, button: App.BUTTON_SPAN };
        const rotation = hA.col === hB.col ? 1 : 0;
        ghost = App.buildPreview(type, SPANS[type] || 2, bb.HS, rotation);
        ghost.position.set((hA.x + hB.x) / 2, 0, (hA.z + hB.z) / 2);
      }

    } else if (a.tool === 'place_battery') {
      ghost = App.buildPreview('battery', 0, bb.HS, 0);
      ghost.position.set(13, 0, 0);

    } else if (a.tool === 'add_wire') {
      ghost = _buildWireGhost(a.from, a.to, a.color, pendingPins);

    } else if (a.tool === 'remove_component') {
      // Highlight the component to be removed with red tint
      const m = a.id && a.id.match(/^(\w+)_(\d+)$/);
      if (m) {
        const comps = App.state.components.filter(c => c.type === m[1]);
        const comp = comps[parseInt(m[2])];
        if (comp && comp.group) {
          comp.group.traverse(child => {
            if (child.isMesh && child.material) {
              child._origMaterial = child.material;
              child.material = child.material.clone();
              child.material.color.set(0xff0000);
              child.material.transparent = true;
              child.material.opacity = 0.5;
            }
          });
          _pendingGhosts.push({ _isRemovalHighlight: true, comp: comp });
        }
      }

    } else if (a.tool === 'remove_wire') {
      // Highlight the wire to be removed with red tint
      const normFrom = a.from?.toLowerCase(), normTo = a.to?.toLowerCase();
      function hk(ref) { return ref ? ref.row + (ref.col + 1) : null; }
      function pk(comp, pi) { const i = App.state.components.indexOf(comp); return comp ? `${comp.type}_${i}_pin${pi}` : null; }
      const wire = App.state.wires.find(w => {
        const ws = w.startHole ? hk(w.startHole) : pk(w.startComp, w.startPinIdx);
        const we = w.endHole ? hk(w.endHole) : pk(w.endComp, w.endPinIdx);
        return (ws === normFrom && we === normTo) || (ws === normTo && we === normFrom);
      });
      if (wire && wire.group) {
        wire.group.traverse(child => {
          if (child.isMesh && child.material) {
            child._origMaterial = child.material;
            child.material = child.material.clone();
            child.material.color.set(0xff0000);
            child.material.transparent = true;
            child.material.opacity = 0.5;
          }
        });
        _pendingGhosts.push({ _isRemovalHighlight: true, wire: wire });
      }
    }
    // delete_all: no ghost mesh — flagged in the pending bar text instead

    if (ghost) { App.scene.add(ghost); _pendingGhosts.push(ghost); }
  }

  // Show the pending bar
  document.getElementById('sparky-pending-bar').style.display = 'flex';
}

function _buildWireGhost(fromStr, toStr, colorName, pendingPins) {
  const bb  = App.state.breadboard;
  const hex = colorName ? (_COLOR_MAP[colorName.toLowerCase()] || 0xef4444) : 0xef4444;

  function resolvePos(str) {
    // Check pending pins first (for not-yet-placed components e.g. battery preview)
    if (pendingPins && pendingPins[str]) return pendingPins[str].clone();
    // Try breadboard hole
    const [col, row] = parseHole(str);
    if (col !== null) {
      const h = bb.getHole(col, row);
      if (h) return new THREE.Vector3(h.x, 0.06, h.z);
    }
    // Try existing placed component pin
    const pinM = str.match(/^(\w+)_(\d+)_pin(\d+)$/i);
    if (pinM) {
      const comps = App.state.components.filter(c => c.type === pinM[1]);
      const comp  = comps[parseInt(pinM[2])];
      const pm    = comp?.pinMeshes[parseInt(pinM[3])];
      if (pm) return pm.userData.world.clone();
    }
    return null;
  }

  const start = resolvePos(fromStr);
  const end   = resolvePos(toStr);
  if (!start || !end) return null;

  const g    = new THREE.Group();
  const mat  = new THREE.MeshLambertMaterial({ color: hex, transparent: true, opacity: 0.42, depthWrite: false });
  const dist = start.distanceTo(end);
  const mid  = new THREE.Vector3(
    (start.x + end.x) / 2,
    Math.max(start.y, end.y) + dist * 0.22 + 0.38,
    (start.z + end.z) / 2
  );
  const curve = new THREE.CatmullRomCurve3([start, mid, end]);
  g.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 26, 0.043, 7, false), mat));
  return g;
}

function sparkyAcceptChanges() {
  if (!_pendingActions) return;
  const actions = _pendingActions;
  _sparkyClearGhosts();
  _pendingActions = null;
  document.getElementById('sparky-pending-bar').style.display = 'none';

  const n = sparkyExecActions(actions);
  sparkyAddMsg(`✓ Applied ${n} change${n !== 1 ? 's' : ''} to your circuit.`, 'system');
}

function sparkyDeclineChanges() {
  if (!_pendingActions) return;
  _sparkyClearGhosts();
  _pendingActions = null;
  document.getElementById('sparky-pending-bar').style.display = 'none';
  sparkyAddMsg('Changes declined.', 'system');
}

function _sparkyClearGhosts() {
  _pendingGhosts.forEach(g => {
    if (g._isRemovalHighlight) {
      // Restore original materials on highlighted components/wires
      const target = g.comp ? g.comp.group : g.wire ? g.wire.group : null;
      if (target) {
        target.traverse(child => {
          if (child.isMesh && child._origMaterial) {
            child.material = child._origMaterial;
            delete child._origMaterial;
          }
        });
      }
    } else {
      App.scene.remove(g);
    }
  });
  _pendingGhosts = [];
}

// ── Main ask ─────────────────────────────────────────────────────

async function sparkyAsk(overrideMsg) {
  const input = document.getElementById('sparky-input');
  const msg   = (overrideMsg !== undefined) ? overrideMsg : input.value.trim();
  if (!msg) return;

  // If there's an open preview, dismiss it before sending a new message
  if (_pendingActions) {
    _sparkyClearGhosts();
    _pendingActions = null;
    document.getElementById('sparky-pending-bar').style.display = 'none';
  }

  sparkyAddMsg(msg, 'user');
  input.value = '';
  input.style.height = 'auto';

  const typingEl = sparkyTyping();

  try {
    const markdown = (typeof App !== 'undefined' && App.exportMarkdown)
      ? App.exportMarkdown() : '_Board not ready._';

    const data = await askGeminiClient(markdown, msg, chatHistory.slice(-20));
    typingEl.remove();
    sparkyAddMsg(data.reply || '(no reply)', 'ai');

    // Store turn pair for conversation memory
    chatHistory.push({ role: 'user', text: msg });
    chatHistory.push({ role: 'model', text: data.reply || '' });

    if (data.actions && data.actions.length) {
      sparkyPreviewActions(data.actions);
    }

  } catch (err) {
    typingEl.remove();
    sparkyAddMsg('⚠️ ' + err.message, 'system');
  }

}

function sparkyQuick(msg) { sparkyAsk(msg); }

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('sparky-input');
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sparkyAsk(); }
  });
  // Auto-resize textarea as user types
  function autoResize() {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 100) + 'px';
  }
  inp.addEventListener('input', autoResize);
});
